# cargo-deny configuration
#
# Replaces cargo-audit on the CI gate. cargo-deny covers a broader supply-chain
# surface: vulnerability advisories, license compliance, source allowlists,
# banned-crate enforcement.
#
# See: https://embarkstudios.github.io/cargo-deny/

[advisories]
# Both ignores below reach the project only via `axum-test`, which is a
# [dev-dependencies] crate used by the integration test suite. The released
# `jellyfin-exporter` binary and its container image do NOT link against
# any of these vulnerable versions; impact on production users is zero.
# Re-verify on each axum-test release.
#
# - RUSTSEC-2026-0009: time 0.3.45 stack-exhaustion DoS, via
#   axum-test → cookie → time.
# - RUSTSEC-2026-0097: rand 0.9.2 unsoundness when a custom logger calls
#   rand::rng() with all the advisory's preconditions met, via
#   axum-test → rust-multipart-rfc7578_2 → rand.
ignore = ["RUSTSEC-2026-0009", "RUSTSEC-2026-0097"]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8
unused-allowed-license = "allow"

[bans]
# `prometheus 0.14` pulls `protobuf 3.x` which depends on `thiserror 1.x`,
# while we use `thiserror 2.x` directly. Both are proc-macro-only with zero
# runtime cost, but cargo-deny flags the duplicate. Fix lands upstream when
# the prometheus crate bumps to thiserror 2; until then, skip.
multiple-versions = "warn"
skip = [
    { name = "thiserror", version = "=1.0.69" },
    { name = "thiserror-impl", version = "=1.0.69" },
]
